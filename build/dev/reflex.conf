# Run API server (rebuild on any .go change)
#
-s -r '\.go$' -- sh -c 'CGO_ENABLED=1 go run -tags sqlite_fts5 ./cmd/server/main.go'

# Run tests for the package of the changed file
#
-r '\.go$' -- sh -c '
file="$1"
dir=$(dirname "$file")
CGO_ENABLED=1 go test -tags sqlite_fts5 -count=1 "./$dir"
' -- {}

# Re-run full test suite when main changes
#
-r 'cmd/server/main\.go$' -- sh -c 'CGO_ENABLED=1 go test -tags sqlite_fts5 -count=1 ./...'
